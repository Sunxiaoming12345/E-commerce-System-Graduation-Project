# ============================================================
# Redis Sentinel 高可用集群（3 节点 + 3 哨兵）
#
# 架构:
#   redis-master (6379)  ← 读写
#   redis-replica-1 (6380) ← 只读副本
#   redis-replica-2 (6381) ← 只读副本
#   sentinel-1 (26379)     ← 监控 + 自动故障转移
#   sentinel-2 (26380)
#   sentinel-3 (26381)
#
# 启动: docker-compose -f docker-compose.redis.yml up -d
# ============================================================

version: '3.8'

services:
  # ==================== Redis 节点 ====================

  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - redis-master-data:/data
      - ./redis-master.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - microservice-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis-replica-1:
    image: redis:7-alpine
    container_name: redis-replica-1
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6380:6379"
    volumes:
      - redis-replica1-data:/data
      - ./redis-replica.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - microservice-net
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy

  redis-replica-2:
    image: redis:7-alpine
    container_name: redis-replica-2
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6381:6379"
    volumes:
      - redis-replica2-data:/data
      - ./redis-replica.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - microservice-net
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy

  # ==================== Sentinel 哨兵 ====================

  sentinel-1:
    image: redis:7-alpine
    container_name: sentinel-1
    command: redis-sentinel /data/sentinel.conf
    ports:
      - "26379:26379"
    volumes:
      - ./sentinel-1:/data
    networks:
      - microservice-net
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy

  sentinel-2:
    image: redis:7-alpine
    container_name: sentinel-2
    command: redis-sentinel /data/sentinel.conf
    ports:
      - "26380:26379"
    volumes:
      - ./sentinel-2:/data
    networks:
      - microservice-net
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy

  sentinel-3:
    image: redis:7-alpine
    container_name: sentinel-3
    command: redis-sentinel /data/sentinel.conf
    ports:
      - "26381:26379"
    volumes:
      - ./sentinel-3:/data
    networks:
      - microservice-net
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy

networks:
  microservice-net:
    external: true
    name: microservice-net

volumes:
  redis-master-data:
  redis-replica1-data:
  redis-replica2-data:
