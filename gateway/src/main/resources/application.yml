
server:
  address: 0.0.0.0
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  shardingsphere:
    datasource:
      names: write-ds, read-ds
      write-ds:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: jdbc:mysql://192.168.100.128:3306/bysj?useUnicode=true&characterEncoding=UTF-8&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
        username: root
        password: 1234
      read-ds:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: jdbc:mysql://192.168.100.128:3307/bysj?useUnicode=true&characterEncoding=UTF-8&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
        username: root
        password: 1234
    rules:
      readwrite-splitting:
        data-sources:
          rw_ds:
            type: Static
            props:
              write-data-source-name: write-ds
              read-data-source-names: read-ds
              load-balancer-name: round_robin
    props:
      sql-show: true
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.100.128:8848
    gateway:
      routes:
        # 精确路由必须放在 /user/** 之前，避免被通用匹配吞掉
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/user/orders/**
        - id: cart-service-user-products
          uri: lb://cart-service
          predicates:
            - Path=/user/products/**
        - id: cart-service-user-cart
          uri: lb://cart-service
          predicates:
            - Path=/user/shopCart/**
        # chat-service 必须在 mailadmin(/admin/**) 之前，否则 /admin/chat/** 会被 mailadmin 截胡
        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/user/chat/**,/admin/chat/**,/ws/**
        # seckill 管理路由必须在 /admin/** 之前
        - id: seckill-service-admin
          uri: lb://coupon-service
          predicates:
            - Path=/admin/seckill/**
        - id: mailadmin
          uri: lb://mailadmin
          predicates:
            - Path=/admin/**
        # admin 商品管理 API（必须在 /products/** 之前，避免被 cart-service 吞掉）
        - id: lottery-service-admin
          uri: lb://mailadmin
          predicates:
            - Path=/admin/lottery/**
        - id: mailadmin-products
          uri: lb://mailadmin
          predicates:
            - Path=/products/products/**
        - id: cart-service-products
          uri: lb://cart-service
          predicates:
            - Path=/products/**
        - id: cart-service-cart
          uri: lb://cart-service
          predicates:
            - Path=/cart/**
        # 用户端独立服务路由（必须在 /user/** 之前）
        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/user/reviews/**
        - id: seckill-service
          uri: lb://coupon-service
          predicates:
            - Path=/user/seckill/**
        - id: lottery-service
          uri: lb://coupon-service
          predicates:
            - Path=/user/lottery/**
        - id: coupon-service
          uri: lb://coupon-service
          predicates:
            - Path=/user/coupons/**
        - id: refund-service
          uri: lb://refund-service
          predicates:
            - Path=/user/refunds/**
        # /user/login、/user/register、/user/send-code 由 gateway 本地 LoginController 处理
        # /user/avatar 头像上传（mailadmin 的 Tomcat 处理 multipart）
        - id: user-avatar
          uri: lb://mailadmin
          predicates:
            - Path=/user/avatar
        # 其余 /user/info、/user/balance/** 等转发到 user-service
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user/info, /user/password, /user/balance/**
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER

minio:
  url: http://192.168.100.128:9000
  access.name: minioadmin
  access.secret: minio236547
  bucket.name: images
  redis:
    host: 192.168.100.128
    port: 6379
    database: 0



mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.gateway.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true
