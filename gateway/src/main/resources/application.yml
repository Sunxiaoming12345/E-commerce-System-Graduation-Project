server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bysj?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.100.128:8848
    gateway:
      routes:
        - id: mailadmin
          uri: lb://mailadmin
          predicates:
            - Path=/admin/orders/** ,/products/products/**
        - id: mailuser
          uri: lb://mailuser
          predicates:
            - Path=/user/orders/**





mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.gateway.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true
