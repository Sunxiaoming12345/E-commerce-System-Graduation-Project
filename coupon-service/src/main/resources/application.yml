server:
  address: 0.0.0.0
  port: 8086
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  redis:
    host: 192.168.100.128
    port: 6379
    database: 0
  rabbitmq:
    host: 192.168.100.128
    port: 5672
    username: guest
    password: guest
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    jdbc-url: jdbc:mysql://192.168.100.128:3306/bysj?useUnicode=true&characterEncoding=UTF-8&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: root
    password: 1234
  application:
    name: coupon-service
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.100.128:8848
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.entity
  configuration:
    map-underscore-to-camel-case: true
