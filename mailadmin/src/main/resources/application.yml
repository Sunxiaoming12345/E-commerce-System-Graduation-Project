server:
  address: 0.0.0.0
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  jackson:
    time-zone: Asia/Shanghai
  shardingsphere:
    datasource:
      names: write-ds, read-ds
      write-ds:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: jdbc:mysql://192.168.100.128:3306/bysj?useUnicode=true&characterEncoding=UTF-8&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
        username: root
        password: 1234
      read-ds:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: jdbc:mysql://192.168.100.128:3307/bysj?useUnicode=true&characterEncoding=UTF-8&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
        username: root
        password: 1234
    rules:
      readwrite-splitting:
        data-sources:
          rw_ds:
            type: Static
            props:
              write-data-source-name: write-ds
              read-data-source-names: read-ds
              load-balancer-name: round_robin
    props:
      sql-show: true
  application:
    name: mailadmin
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.100.128:8848
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
  rabbitmq:
    host: 192.168.100.128       # RabbitMQ 服务器IP
    port: 5672                  # AMQP 协议端口
    username: guest         # 用户名
    password: guest          # 密码
    virtual-host: /             # 虚拟主机（默认即可）
  redis:
    host: 192.168.100.128       # Redis 服务器IP
    port: 6379                  # Redis 端口
    password:                    # Redis 密码（如果没有设置密码则为空）
    database: 0                  # Redis 数据库索引
  servlet:
    multipart:
      max-file-size: 10MB        # 单个文件最大大小
      max-request-size: 10MB      # 请求总大小最大限制


mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.mailadmin.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

minio:
  url: http://192.168.100.128:9000
  access.name: root
  access.secret: minio236547
  bucket.name: images