# ============================================================
# 仅启动 MySQL + 微服务（复用已有的 Redis/Nacos/RabbitMQ/MinIO）
#
# 前提：现有容器已接入 microservice-net 网络
#       redis / nacos / my-rabbitmq / minio-2024
#
# 启动：docker compose -f docker-compose.apps.yml up -d --build
# 停止：docker compose -f docker-compose.apps.yml down
# ============================================================

services:
  # ==================== 数据库（唯一需要新启动的基础设施） ====================

  mysql:
    image: mysql:8.0
    container_name: bysj-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bysj}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    networks:
      - microservice-net
      - bridge
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-1234}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  # ==================== 微服务 ====================

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: bysj-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      TZ: Asia/Shanghai
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bysj?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: "6379"
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - microservice-net
      - bridge
    restart: unless-stopped

  mailadmin:
    build:
      context: .
      dockerfile: mailadmin/Dockerfile
    container_name: bysj-mailadmin
    ports:
      - "${MAILADMIN_PORT:-8081}:8081"
    environment:
      TZ: Asia/Shanghai
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bysj?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: "6379"
      SPRING_RABBITMQ_HOST: my-rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      MINIO_URL: http://minio-2024:9000
      MINIO_ACCESS_NAME: ${MINIO_ROOT_USER:-root}
      MINIO_ACCESS_SECRET: ${MINIO_ROOT_PASSWORD:-minio236547}
      MINIO_BUCKET_NAME: images
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - microservice-net
      - bridge
    restart: unless-stopped

  mailuser:
    build:
      context: .
      dockerfile: mailuser/Dockerfile
    container_name: bysj-mailuser
    ports:
      - "${MAILUSER_PORT:-8082}:8082"
    environment:
      TZ: Asia/Shanghai
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bysj?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: "6379"
      SPRING_RABBITMQ_HOST: my-rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - microservice-net
      - bridge
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: bysj-user-service
    ports:
      - "${USER_SERVICE_PORT:-8083}:8083"
    environment:
      TZ: Asia/Shanghai
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bysj?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: "6379"
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - microservice-net
      - bridge
    restart: unless-stopped

  cart-service:
    build:
      context: .
      dockerfile: cart-service/Dockerfile
    container_name: bysj-cart-service
    ports:
      - "${CART_SERVICE_PORT:-8084}:8084"
    environment:
      TZ: Asia/Shanghai
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bysj?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: "6379"
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - microservice-net
      - bridge
    restart: unless-stopped

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: bysj-order-service
    ports:
      - "${ORDER_SERVICE_PORT:-8085}:8082"
    environment:
      TZ: Asia/Shanghai
      JAVA_OPTS: "-Xms128m -Xmx256m -XX:+UseG1GC"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bysj?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: "6379"
      SPRING_RABBITMQ_HOST: my-rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - microservice-net
      - bridge
    restart: unless-stopped

# ==================== 网络（使用已有的 microservice-net） ====================
networks:
  microservice-net:
    external: true
    name: microservice-net
  bridge:
    external: true
    name: bridge

# ==================== 数据卷 ====================
volumes:
  mysql-data:
    name: bysj-mysql-data
